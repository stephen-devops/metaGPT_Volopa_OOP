# =============================================================================
# 6. DECISIONS
# =============================================================================
decisions:
  description: "Architectural commitments and tradeoffs"

  architectural_decisions:
    - id: "DEC-001"
      decision: "Synchronous validation, asynchronous sync"
      rationale: "CSV validation is fast enough for 200 rows to run synchronously, giving immediate feedback. Sync to main service is decoupled via background job to avoid blocking."
      source: "SD-OOP_Pocket_expense.json#storing_pocket_expenses_from_file_upload"

    - id: "DEC-002"
      decision: "Local staging table (pocket_expense_uploads_data) before sync"
      rationale: "Validated rows are committed locally first, then synced in batches. This ensures the upload is durable even if the main service is temporarily unavailable."
      source: "SD-OOP_Pocket_expense.json#storing_pocket_expenses_from_file_upload"

    - id: "DEC-003"
      decision: "Batch sync in groups of 100"
      rationale: "Balances throughput vs memory/timeout risk for the background job"
      source: "SD-OOP_Pocket_expense.json#storing_pocket_expenses_from_file_upload"

    - id: "DEC-004"
      decision: "All-or-nothing CSV validation"
      rationale: "Prevents partial data from entering the system. Forces clean uploads rather than requiring error reconciliation."
      source: "SD-OOP_Pocket_expense.json#file_processing"

    - id: "DEC-005"
      decision: "Polymorphic metadata table (pocket_expense_metadata) with ENUM metadata_type"
      rationale: "Single table with type discriminator avoids proliferation of join tables. details_json provides flexible extension without schema changes."
      source: "SD-OOP_Expense_single_data_capturing.json#database_schema"

    - id: "DEC-006"
      decision: "Global 'Other' expense source with client_id = NULL"
      rationale: "Provides a universal fallback source that cannot be deleted, ensuring every expense can have a source. Custom text captured in metadata."
      source: "SD-OOP_Expense_single_data_capturing.json#oop_expense_source"

    - id: "DEC-007"
      decision: "Soft delete for expense sources (deleted flag, not Laravel SoftDeletes)"
      rationale: "Historical expenses must continue showing their original source name even after the source is deactivated."
      source: "SD-OOP_Expense_single_data_capturing.json#oop_expense_source"

    - id: "DEC-008"
      decision: "User-overridable FX conversion with backend recalculation"
      rationale: "Frontend convenience with backend safety. User may have a better rate or receipt-based amount, but backend recalculates to store the system rate alongside."
      source: "SD-OOP_Expense_single_data_capturing.json#fx_conversion_flow"

    - id: "DEC-009"
      decision: "Permission delegation via user_feature_permission table with manager_user_id"
      rationale: "Single table captures both feature enablement and management delegation. Avoids separate permission and delegation systems."
      source: "SD-OOP_User_Management_System.json#database_schema"

    - id: "DEC-010"
      decision: "Validation errors stored as JSON in pocket_expense_file_uploads"
      rationale: "Allows retrieval and download of error details without a separate errors table. Suitable for max 200 rows."
      source: "SD-OOP_Pocket_expense.json#error_response"

    - id: "DEC-011"
      decision: "pocket_expense supersedes oop_expenses — single table, not two"
      rationale: |
        SD-OOP_User_Management_System.json defines 'oop_expenses' as an early ER sketch (flat table,
        inline VARCHAR fields for source/category/tracking/project/receipt, ENUM transaction_type,
        BIGINT UNSIGNED ids, Laravel timestamps, no soft delete).
        SD-OOP_Expense_single_data_capturing.json defines 'pocket_expense' as the refined implementation
        that normalises inline fields into pocket_expense_metadata, externalises expense type to
        opt_pocket_expense_type, externalises source to pocket_expense_source_client_config, adds uuid,
        audit fields (created_by/updated_by), soft delete, and refines column types.
        These are the SAME domain concept at different maturity levels. pocket_expense is authoritative.
      source: "SD-OOP_Expense_single_data_capturing.json#database_schema vs SD-OOP_User_Management_System.json#database_schema"
      do_not_build:
        - "OopExpense model (app/Models/OopExpense.php)"
        - "OopExpenseController (app/Http/Controllers/Api/OopExpenseController.php)"
        - "OopExpenseService (app/Services/OopExpenseService.php)"
        - "OopExpensePolicy (app/Policies/OopExpensePolicy.php)"
        - "OopExpenseResource (app/Http/Resources/OopExpenseResource.php)"
        - "StoreOopExpenseRequest, UpdateOopExpenseRequest"
        - "create_oop_expenses_table migration"
      supersession_detail:
        oop_expenses_status: "ENUM('pending','approved','rejected','in_review')"
        pocket_expense_status: "ENUM('draft','submitted','approved','rejected')"
        note: "'draft' replaces 'pending', 'submitted' replaces 'in_review'. The pocket_expense status values are authoritative."

    - id: "DEC-012"
      decision: "Upload audit record created BEFORE validation, not after"
      rationale: |
        The pocket_expense_file_uploads record must be created immediately after basic file checks
        (FLOW-CSV-002) with status='uploaded', BEFORE CSV row validation begins (FLOW-CSV-003).
        This ensures every upload attempt has an audit trail regardless of validation outcome.
        The record is then UPDATED with validation results (FLOW-CSV-004).
        Do NOT defer record creation to inside the validation-success path.
      source: "SD-OOP_Pocket_expense.json#file_processing"
      flow_reference: "flows.csv_upload_flow steps FLOW-CSV-001 through FLOW-CSV-004"

  unresolved:
    - id: "DEC-UNRESOLVED-001"
      area: "Notification channel for batch upload"
      context: project
      question: "What notification channel for batch upload completion? In-app, email, push, or combination?"
      source: "SD-OOP_Pocket_expense.json#file_processing.steps[5]"
      note: "This is a project-specific decision — the notification is triggered by OOP Expense batch processing (FLOW-CSV-008). The underlying notification infrastructure availability is tracked in environment_artifacts.yaml#standard_volopa_infrastructure[Notification System] (origin: UNKNOWN)."

    - id: "DEC-UNRESOLVED-002"
      area: "FX conversion origin"
      context: project
      question: "Is the wallet-ccy-value + 30-day lookback + commission calculation reusing an existing platform FX service or is this a new integration?"
      source: "SD-OOP_Expense_single_data_capturing.json#fx_conversion_flow.step_2_fx_calculation"
      current_annotation: "origin: UNKNOWN"
      note: "This is a project-level integration decision. The platform FX infrastructure exists (environment_artifacts.yaml#standard_volopa_infrastructure[FX Service]) but whether the specific debounce + lookback + commission pattern is reuse or new is project-specific."

    - id: "DEC-UNRESOLVED-003"
      area: "Audit logging mechanism"
      context: split
      question: "What is the implementation for audit logging of permission grants/revokes? Separate audit table, event sourcing, or Laravel activity log?"
      source: "SD-OOP_User_Management_System.json#database_schema.notes"
      see: "environment_context.yaml#decisions.unresolved[ENV-DEC-UNRESOLVED-002] for whether a platform-standard audit mechanism exists"
      note: "If a platform audit mechanism exists, this project should reuse it. If not, a project-specific decision is needed."

    - id: "DEC-UNRESOLVED-004"
      area: "ClientFeatures — OOP feature enablement lookup"
      context: split
      question: "How is 'Client has OOP feature enabled' determined? What is the ClientFeatures model's backing table, and how does feature_id = 16 (OOP Expense) get checked?"
      source: "SD-OOP_Pocket_expense.json#api_contract.additional_checks"
      evidence:
        - "user_feature_permission.feature_id FK references features(id) — table is origin: EXISTING but schema undefined"
        - "Example data uses feature_id = 16 for OOP Expense (SD-OOP_User_Management_System.json#example_data)"
        - "ClientFeatures model (origin: EXISTING) is referenced for 'Client has OOP feature enabled' check but has no table field defined"
        - "SD-OOP_Expense_single_data_capturing.json#oop_expense_source.on_client_oop_feature_enable triggers default source seeding"
      see: "environment_artifacts.yaml#standard_volopa_models[ClientFeatures] — model exists but backing table unknown"
      note: "The features table and ClientFeatures model are existing platform components. The project needs to know the query pattern to check if a client has the OOP feature enabled (e.g. ClientFeatures::where('client_id', $clientId)->where('feature_id', 16)->exists())."

