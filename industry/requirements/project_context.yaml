  # ---------------------------------------------------------------------------
  # Project-Specific Flows (origin: NEW)
  # ---------------------------------------------------------------------------
  permission_enablement_flow:
    name: "OOP Feature Enablement & Permission Setup"
    source: "SD-OOP_User_Management_System.json#access_control_flow"
    steps:
      - id: "FLOW-PE-001"
        name: "Service Enablement"
        description: "Sales/Ops Management enables Expense via Admin.Volopa"
      - id: "FLOW-PE-002"
        name: "Validation"
        description: "System validates client has card services active"
      - id: "FLOW-PE-003"
        name: "Notification"
        description: "Email notification sent to client Primary Admin"
      - id: "FLOW-PE-004"
        name: "Default Permissions"
        description: "Default permissions applied automatically to all users under client"
      - id: "FLOW-PE-005"
        name: "Expense Source Seeding"
        description: "3 default sources (Cash, Corporate Card, Personal Card) auto-created in pocket_expense_source_client_config"

  permission_delegation_flow:
    name: "Management Rights Grant/Revoke"
    source: "SD-OOP_User_Management_System.json#access_control_flow"
    steps:
      - id: "FLOW-PD-001"
        name: "Grant Initiation"
        description: "Primary Admin or Admin navigates to Settings > Manage Users (or Volopa Admin via Admin.Volopa)"
      - id: "FLOW-PD-002"
        name: "Assign Manager"
        description: "Grantor assigns manager_user_id to target user in user_feature_permission table"
      - id: "FLOW-PD-003"
        name: "Permission Activation"
        description: "Managed user now accessible by assigned manager for add/edit/view (and approve if Admin)"
      - id: "FLOW-PD-004"
        name: "Revocation"
        description: "Primary Admin or Volopa Admin revokes managing rights"
      - id: "FLOW-PD-005"
        name: "Fallback"
        description: "Revoked user falls back to Primary Admin management until reassigned"

  single_expense_fx_flow:
    name: "FX Conversion for Single Expense Entry"
    source: "SD-OOP_Expense_single_data_capturing.json#fx_conversion_flow"
    steps:
      - id: "FLOW-FX-001"
        name: "User Input"
        description: "User enters Date, Currency, Amount"
      - id: "FLOW-FX-002"
        name: "Completeness Check"
        description: "Check all required fields entered; if not, wait for input"
      - id: "FLOW-FX-003"
        name: "Debounce"
        description: "2-second debounce before triggering FX API call"
      - id: "FLOW-FX-004"
        name: "Identify Base Currency"
        description: "Call /wallet-ccy-value endpoint to identify wallet base currency"
        referenced_infra:
          endpoint: "/wallet-ccy-value"
          origin: EXISTING
      - id: "FLOW-FX-005"
        name: "Get Dated FX Rate"
        description: "Look up FX rate for expense date (max 30-day lookback)"
        outcome_not_found: "Return 'No FX Available'"
      - id: "FLOW-FX-006"
        name: "Apply Commission"
        description: "AdjustedRate = BaseRate x (1 - Comm%)"
      - id: "FLOW-FX-007"
        name: "Calculate Converted Amount"
        description: "ConvertedAmount = Amount x AdjustedRate"
      - id: "FLOW-FX-008"
        name: "Frontend Display"
        description: "Frontend populates converted amount field; user may override"
      - id: "FLOW-FX-009"
        name: "Submit & Recalculate"
        description: "On form submit, backend recalculates FX and saves pocket_expense with user_converted_amount if overridden"

  csv_upload_flow:
    name: "CSV Batch Upload Processing"
    source: "SD-OOP_Pocket_expense.json#file_processing"
    steps:
      - id: "FLOW-CSV-001"
        name: "File Upload & Basic Checks"
        description: "CSV uploaded, basic checks (size, extension, format)"
      - id: "FLOW-CSV-002"
        name: "Create Upload Record"
        description: "pocket_expense_file_uploads row created with status='uploaded', user_id, client_id, created_by_user_id, file_name, file_path"
      - id: "FLOW-CSV-003"
        name: "CSV Parsing & Row Validation"
        description: "PocketExpenseCSVValidator instantiated; parses rows (excl header, max 200); validates each row against business rules and reference data"
      - id: "FLOW-CSV-004"
        name: "Validation Persistence"
        description: "Upload record updated with total_records, valid_records, validation_errors JSON, validated_at"
      - id: "FLOW-CSV-005"
        name: "Decision - Validation Failed"
        condition: "Any row has errors"
        actions:
          - "No expenses created"
          - "Upload status set to 'validation_failed'"
          - "API responds 422 with structured error payload"
      - id: "FLOW-CSV-006"
        name: "Decision - Validation Passed"
        condition: "All rows valid"
        actions:
          - "Bulk insert validated rows into pocket_expense_uploads_data (local staging table) with status='pending'"
          - "Upload status set to 'processing'"
          - "Dispatch ProcessExpenseUpload background job"
          - "Return success response (200, upload_id, total_rows)"
      - id: "FLOW-CSV-007"
        name: "Background Sync"
        description: "ProcessExpenseUpload job syncs to main service in batches of 100"
      - id: "FLOW-CSV-008"
        name: "Completion"
        description: "Upload status set to 'completed', processed_at set, notification issued to target user"

    flowchart_sequence:
      - path: "validation_failure"
        sequence:
          - "Upload CSV"
          - "Basic file checks"
          - "Create upload record (status=uploaded)"
          - "Parse & validate all rows"
          - "Errors found"
          - "Update upload record (status=validation_failed)"
          - "Return 422 with error payload"

      - path: "validation_success"
        sequence:
          - "Upload CSV"
          - "Basic file checks"
          - "Create upload record (status=uploaded)"
          - "Parse & validate all rows"
          - "All rows valid"
          - "Bulk insert to pocket_expense_uploads_data"
          - "Update upload record (status=processing)"
          - "Dispatch ProcessExpenseUpload job"
          - "Return 200 success"
          - "Background: sync batches of 100"
          - "Update upload record (status=completed)"
          - "Notify target user"

  msc_csv_upload:
    name: "CSV Upload Sequence"
    diagram_type: "Message Sequence Chart"
    source: "SD-OOP_Pocket_expense.json#api_contract"

    entities:
      - name: "Client"
        context: "Project"
        role: "Initiates CSV upload request"

      - name: "Oauth2UserClient (MW)"
        context: "Environment"
        role: "Authentication middleware"
        see: "environment_artifacts.yaml#standard_volopa_middleware"

      - name: "PocketExpenseUploadController"
        context: "Project"
        role: "Handles CSV upload API endpoint"
        see: "interfaces.controllers"

      - name: "PocketExpenseCSVValidator"
        context: "Project"
        role: "Validates CSV headers and all rows"
        see: "interfaces.services"

      - name: "Storage(pocket-expense-uploads)"
        context: "Environment"
        role: "File storage for uploaded CSVs"
        see: "environment_artifacts.yaml#standard_volopa_infrastructure"

      - name: "pocket_expense_file_uploads (DB)"
        context: "Project"
        role: "Tracks upload audit records"
        see: "interfaces.database_tables[pocket_expense_file_uploads]"

      - name: "pocket_expense_uploads_data (DB)"
        context: "Project"
        role: "Local staging table for validated expense rows"
        see: "interfaces.database_tables[pocket_expense_uploads_data]"

      - name: "Queue(expense-processing)"
        context: "Environment"
        role: "Async job queue for batch sync"
        see: "environment_artifacts.yaml#standard_volopa_infrastructure"

    message_sequence:
      - seq: 1
        from: "Client"
        to: "Oauth2UserClient (MW)"
        message: "POST /api/uploads/pocket-expense/csv (file, user_id, expense_user_id, client_id)"

      - seq: 2
        from: "Oauth2UserClient (MW)"
        to: "PocketExpenseUploadController"
        message: "allow (authenticated)"

      - seq: 3
        from: "PocketExpenseUploadController"
        to: "PocketExpenseUploadController"
        message: "server-side validation (file type, size, user belongs to client, permissions)"

      - seq: 4
        from: "PocketExpenseUploadController"
        to: "Client"
        message: "alt [basic validation fails]: 422 ERROR"
        condition: "basic validation fails"

      - seq: 5
        from: "PocketExpenseUploadController"
        to: "Storage(pocket-expense-uploads)"
        message: "alt [ok]: store CSV file"
        condition: "basic validation ok"

      - seq: 6
        from: "Storage(pocket-expense-uploads)"
        to: "PocketExpenseUploadController"
        message: "filePath"

      - seq: 7
        from: "PocketExpenseUploadController"
        to: "pocket_expense_file_uploads (DB)"
        message: "create PocketExpenseFileUpload{status='uploaded'}"

      - seq: 8
        from: "PocketExpenseUploadController"
        to: "PocketExpenseCSVValidator"
        message: "validate(csv, targetUserId, clientId, adminId)"

      - seq: 9
        from: "PocketExpenseCSVValidator"
        to: "PocketExpenseCSVValidator"
        message: "preload reference data (expense types, currencies, countries, sources)"

      - seq: 10
        from: "PocketExpenseCSVValidator"
        to: "PocketExpenseCSVValidator"
        message: "validate headers, then iterate all rows"

      - seq: 11
        from: "PocketExpenseCSVValidator"
        to: "PocketExpenseUploadController"
        message: "validation result (errors[] or valid_rows[])"

      - seq: 12
        from: "PocketExpenseUploadController"
        to: "pocket_expense_file_uploads (DB)"
        message: "update: total_records, valid_records, validation_errors, validated_at, status"

      - seq: 13
        from: "PocketExpenseUploadController"
        to: "Client"
        message: "alt [validation_failed]: 422 {success:false, errors:[], upload_id, total_rows, error_count}"
        condition: "any row invalid"

      - seq: 14
        from: "PocketExpenseUploadController"
        to: "pocket_expense_uploads_data (DB)"
        message: "alt [all valid]: bulk insert validated rows (status='pending')"
        condition: "all rows valid"

      - seq: 15
        from: "PocketExpenseUploadController"
        to: "Queue(expense-processing)"
        message: "dispatch ProcessExpenseUpload(upload_id) on 'expense-processing'"

      - seq: 16
        from: "PocketExpenseUploadController"
        to: "Client"
        message: "200 {success:true, upload_id, total_rows}"

# =============================================================================
# 5. INTERFACES
# =============================================================================
interfaces:
  description: "Structural contracts and schemas"

  database_tables:
    # --- User Management ---
    - name: "user_feature_permission"
      origin: NEW
      source: "SD-OOP_User_Management_System.json#database_schema"
      description: "Permission delegation table linking users to features with optional manager assignment"
      columns:
        - { name: "id", type: "BIGINT UNSIGNED", constraints: ["AUTO_INCREMENT", "PRIMARY KEY"] }
        - { name: "user_id", type: "BIGINT UNSIGNED", constraints: ["NOT NULL"] }
        - { name: "client_id", type: "BIGINT UNSIGNED", constraints: ["NOT NULL"] }
        - { name: "feature_id", type: "BIGINT UNSIGNED", constraints: ["NOT NULL"] }
        - { name: "grantor_id", type: "BIGINT UNSIGNED", constraints: ["NOT NULL"] }
        - { name: "manager_user_id", type: "BIGINT UNSIGNED", constraints: ["NULL"] }
        - { name: "is_enabled", type: "BOOLEAN", default: true }
        - { name: "created_at", type: "TIMESTAMP", constraints: ["NULL"] }
        - { name: "updated_at", type: "TIMESTAMP", constraints: ["NULL"] }
      unique_keys:
        - { name: "unique_user_feature", columns: ["user_id", "client_id", "feature_id"] }
      foreign_keys:
        - { column: "user_id", references: "users(id)", on_delete: "CASCADE", ref_origin: EXISTING }
        - { column: "client_id", references: "clients(id)", on_delete: "CASCADE", ref_origin: EXISTING }
        - { column: "feature_id", references: "features(id)", on_delete: "CASCADE", ref_origin: EXISTING }
        - { column: "grantor_id", references: "users(id)", on_delete: "CASCADE", ref_origin: EXISTING }
        - { column: "manager_user_id", references: "users(id)", on_delete: "CASCADE", ref_origin: EXISTING }

    # --- Single Expense Core Tables ---
    - name: "opt_pocket_expense_type"
      origin: NEW
      source: "SD-OOP_Expense_single_data_capturing.json#database_schema"
      description: "Lookup table for expense/transaction types"
      columns:
        - { name: "id", type: "INT(11) UNSIGNED", constraints: ["NOT NULL", "AUTO_INCREMENT"] }
        - { name: "option", type: "VARCHAR(128)", constraints: ["NOT NULL"], default: "" }
        - { name: "amount_sign", type: "ENUM('positive','negative')", default: "negative" }
      primary_key: "id"
      seed_data:
        - { option: "ATM Withdrawal", amount_sign: "negative" }
        - { option: "Point of Sale", amount_sign: "negative" }
        - { option: "Fee & Charges", amount_sign: "negative" }
        - { option: "Refund from Merchant", amount_sign: "positive" }

    - name: "pocket_expense_source_client_config"
      origin: NEW
      source: "SD-OOP_Expense_single_data_capturing.json#database_schema"
      description: "Client-specific and global expense source configuration"
      columns:
        - { name: "id", type: "INT(10) UNSIGNED", constraints: ["NOT NULL", "AUTO_INCREMENT"] }
        - { name: "uuid", type: "VARCHAR(36)", default: "NULL" }
        - { name: "client_id", type: "BIGINT UNSIGNED", default: "NULL" }
        - { name: "name", type: "VARCHAR(100)", constraints: ["NOT NULL"] }
        - { name: "is_default", type: "TINYINT(1) UNSIGNED", constraints: ["NOT NULL"], default: 0 }
        - { name: "deleted", type: "TINYINT(1) UNSIGNED", constraints: ["NOT NULL"], default: 0 }
        - { name: "delete_time", type: "DATETIME", default: "NULL" }
        - { name: "create_time", type: "DATETIME", default: "NULL" }
        - { name: "update_time", type: "DATETIME", default: "NULL" }
      primary_key: "id"
      unique_keys:
        - { name: "oop_expense_source_client_name_unique", columns: ["client_id", "name"] }
      foreign_keys:
        - { column: "client_id", references: "clients(id)", ref_origin: EXISTING }

    - name: "pocket_expense"
      origin: NEW
      source: "SD-OOP_Expense_single_data_capturing.json#database_schema"
      description: "Main table for out-of-pocket expense records"
      columns:
        - { name: "id", type: "INT(10) UNSIGNED", constraints: ["NOT NULL", "AUTO_INCREMENT"] }
        - { name: "uuid", type: "VARCHAR(36)", default: "NULL" }
        - { name: "user_id", type: "BIGINT UNSIGNED", constraints: ["NOT NULL"] }
        - { name: "client_id", type: "BIGINT UNSIGNED", default: "NULL" }
        - { name: "date", type: "DATE", constraints: ["NOT NULL"] }
        - { name: "merchant_name", type: "VARCHAR(180)", constraints: ["NOT NULL"] }
        - { name: "merchant_description", type: "VARCHAR(255)", default: "NULL" }
        - { name: "expense_type", type: "INT(11) UNSIGNED", default: "NULL" }
        - { name: "currency", type: "CHAR(3)", constraints: ["NOT NULL"] }
        - { name: "amount", type: "DECIMAL(14,2)", constraints: ["NOT NULL"], default: "0.00" }
        - { name: "merchant_address", type: "VARCHAR(500)", default: "NULL" }
        - { name: "vat_amount", type: "DECIMAL(12,2)", default: "NULL" }
        - { name: "notes", type: "TEXT", default: "NULL" }
        - { name: "status", type: "ENUM('draft','submitted','approved','rejected')", default: "draft" }
        - { name: "created_by_user_id", type: "BIGINT UNSIGNED", constraints: ["NOT NULL"] }
        - { name: "updated_by_user_id", type: "BIGINT UNSIGNED", default: "NULL" }
        - { name: "approved_by_user_id", type: "BIGINT UNSIGNED", default: "NULL" }
        - { name: "create_time", type: "DATETIME", default: "CURRENT_TIMESTAMP" }
        - { name: "update_time", type: "DATETIME", default: "NULL", on_update: "CURRENT_TIMESTAMP" }
        - { name: "deleted", type: "TINYINT(1) UNSIGNED", constraints: ["NOT NULL"], default: 0 }
        - { name: "delete_time", type: "DATETIME", default: "NULL" }
      primary_key: "id"
      indexes:
        - { name: "pocket_expense_user_id_foreign", column: "user_id" }
        - { name: "pocket_expense_client_id_foreign", column: "client_id" }
        - { name: "pocket_expense_expense_type_foreign", column: "expense_type" }
      foreign_keys:
        - { column: "user_id", references: "users(id)", ref_origin: EXISTING }
        - { column: "client_id", references: "clients(id)", ref_origin: EXISTING }
        - { column: "expense_type", references: "opt_pocket_expense_type(id)", ref_origin: NEW }

    - name: "pocket_expense_metadata"
      origin: NEW
      source: "SD-OOP_Expense_single_data_capturing.json#database_schema"
      description: "Flexible metadata storage for pocket expenses (one record per type per expense)"
      columns:
        - { name: "id", type: "INT(10) UNSIGNED", constraints: ["NOT NULL", "AUTO_INCREMENT"] }
        - { name: "pocket_expense_id", type: "INT(10) UNSIGNED", constraints: ["NOT NULL"] }
        - { name: "metadata_type", type: "ENUM('category','tracking_code_type_1','tracking_code_type_2','project','additional_field','file','expense_source')", constraints: ["NOT NULL"] }
        - { name: "transaction_category_id", type: "INT(10) UNSIGNED", default: "NULL" }
        - { name: "tracking_code_id", type: "INT(10) UNSIGNED", default: "NULL" }
        - { name: "project_id", type: "INT(10) UNSIGNED", default: "NULL" }
        - { name: "file_store_id", type: "INT(10) UNSIGNED", default: "NULL" }
        - { name: "expense_source_id", type: "INT(10) UNSIGNED", default: "NULL" }
        - { name: "additional_field_id", type: "INT(10) UNSIGNED", default: "NULL" }
        - { name: "user_id", type: "BIGINT UNSIGNED", constraints: ["NOT NULL"] }
        - { name: "details_json", type: "JSON", default: "NULL" }
        - { name: "create_time", type: "DATETIME", default: "CURRENT_TIMESTAMP" }
        - { name: "update_time", type: "DATETIME", default: "NULL", on_update: "CURRENT_TIMESTAMP" }
        - { name: "deleted", type: "TINYINT(1) UNSIGNED", constraints: ["NOT NULL"], default: 0 }
        - { name: "delete_time", type: "DATETIME", default: "NULL" }
      primary_key: "id"
      unique_keys:
        - { name: "unique_expense_metadata_type", columns: ["pocket_expense_id", "metadata_type", "deleted"] }
      indexes:
        - { name: "metadata_expense_id_index", column: "pocket_expense_id" }
        - { name: "metadata_type_index", column: "metadata_type" }
        - { name: "metadata_category_index", column: "transaction_category_id" }
        - { name: "metadata_tracking_code_index", column: "tracking_code_id" }
        - { name: "metadata_project_index", column: "project_id" }
        - { name: "metadata_file_index", column: "file_store_id" }
        - { name: "metadata_source_index", column: "expense_source_id" }
      foreign_keys:
        - { column: "pocket_expense_id", references: "pocket_expense(id)", ref_origin: NEW }
        - { column: "transaction_category_id", references: "transaction_category(id)", ref_origin: EXISTING }
        - { column: "tracking_code_id", references: "tracking_codes(id)", ref_origin: EXISTING }
        - { column: "project_id", references: "configurable_projects(id)", ref_origin: EXISTING }
        - { column: "file_store_id", references: "file_store(id)", ref_origin: EXISTING }
        - { column: "expense_source_id", references: "pocket_expense_source_client_config(id)", ref_origin: NEW }
        - { column: "additional_field_id", references: "expense_additional_field(id)", ref_origin: EXISTING }
        - { column: "user_id", references: "users(id)", ref_origin: EXISTING }

    # --- CSV Upload Tables ---
    - name: "pocket_expense_file_uploads"
      origin: NEW
      source: "SD-OOP_Pocket_expense.json#data_model"
      description: "Audit trail for CSV batch uploads"
      columns:
        - { name: "id", type: "BIGINT(20) UNSIGNED", constraints: ["NOT NULL", "AUTO_INCREMENT"] }
        - { name: "uuid", type: "VARCHAR(36)", default: "NULL" }
        - { name: "user_id", type: "BIGINT(20) UNSIGNED", constraints: ["NOT NULL"], comment: "Target user for expenses" }
        - { name: "client_id", type: "BIGINT(20) UNSIGNED", constraints: ["NOT NULL"], comment: "Client/company context" }
        - { name: "created_by_user_id", type: "BIGINT(20) UNSIGNED", constraints: ["NOT NULL"], comment: "Admin who uploaded" }
        - { name: "file_name", type: "VARCHAR(255)", constraints: ["NOT NULL"] }
        - { name: "file_path", type: "VARCHAR(255)", constraints: ["NOT NULL"] }
        - { name: "total_records", type: "INT(10) UNSIGNED", default: 0, constraints: ["NOT NULL"] }
        - { name: "valid_records", type: "INT(10) UNSIGNED", default: 0, constraints: ["NOT NULL"] }
        - { name: "validation_errors", type: "JSON", default: "NULL", comment: "Structured error data" }
        - { name: "status", type: "ENUM('uploaded','validation_failed','validation_passed','processing','completed','failed','sync_failed')", default: "uploaded" }
        - { name: "uploaded_at", type: "TIMESTAMP", default: "NULL" }
        - { name: "validated_at", type: "TIMESTAMP", default: "NULL" }
        - { name: "processed_at", type: "TIMESTAMP", default: "NULL" }
        - { name: "created_at", type: "TIMESTAMP", default: "NULL" }
        - { name: "updated_at", type: "TIMESTAMP", default: "NULL" }
        - { name: "deleted_at", type: "TIMESTAMP", default: "NULL" }
      primary_key: "id"
      indexes:
        - { name: "pocket_expense_file_uploads_user_id_index", column: "user_id" }
        - { name: "pocket_expense_file_uploads_client_id_index", column: "client_id" }
        - { name: "pocket_expense_file_uploads_created_by_user_id_index", column: "created_by_user_id" }
      engine: "InnoDB"
      charset: "utf8mb4"
      collation: "utf8mb4_unicode_ci"
      model: "PocketExpenseFileUpload"
      model_notes: "Standard Eloquent model using soft deletes"

    - name: "pocket_expense_uploads_data"
      origin: NEW
      source: "SD-OOP_Pocket_expense.json#storing_pocket_expenses_from_file_upload"
      description: "Local staging table for validated expense rows pending sync to main service"
      note: "In upload service database"
      columns:
        - { name: "id", type: "BIGINT UNSIGNED", constraints: ["PRIMARY KEY", "AUTO_INCREMENT"] }
        - { name: "upload_id", type: "BIGINT UNSIGNED", constraints: ["NOT NULL"], comment: "FK to pocket_expense_file_uploads" }
        - { name: "line_number", type: "INT", constraints: ["NOT NULL"] }
        - { name: "status", type: "ENUM('pending','processing','synced','failed')", default: "pending" }
        - { name: "expense_data", type: "JSON", constraints: ["NOT NULL"], comment: "Complete validated expense as JSON" }
        - { name: "created_at", type: "TIMESTAMP" }
        - { name: "updated_at", type: "TIMESTAMP" }
      indexes:
        - { name: "idx_upload_status", columns: ["upload_id", "status"] }
        - { name: "idx_pending_sync", columns: ["status"], where: "status IN ('pending', 'failed')" }

    # Referenced Existing Tables ---
    - name: "users"
      origin: EXISTING
      description: "Platform user table - all user roles"
      primary_key: "id"
      columns:
        - { name: "id", type: "BIGINT UNSIGNED", nullable: false, constraints: ["AUTO_INCREMENT"] }
        - { name: "name", type: "VARCHAR(180)", nullable: true }
        - { name: "username", type: "VARCHAR(180)", nullable: true }
        - { name: "deleted", type: "TINYINT(1) UNSIGNED", constraints: ["NOT NULL"], default: 0 }

    - name: "clients"
      origin: EXISTING
      description: "Platform client/company table — multi-tenancy anchor."
      primary_key: "id"
      columns:
        - { name: "id", type: "BIGINT UNSIGNED", nullable: false, constraints: ["AUTO_INCREMENT"] }
        - { name: "name", type: "VARCHAR(180)", nullable: true }
        - { name: "deleted", type: "TINYINT(1) UNSIGNED", constraints: ["NOT NULL"], default: 0 }

    - name: "transaction_category"
      origin: EXISTING
      description: "Expense/transaction category lookup, scoped per client"
      primary_key: "id"
      columns:
        - { name: "id", type: "INT(10) UNSIGNED", nullable: false, constraints: ["AUTO_INCREMENT"] }
        - { name: "name", type: "VARCHAR(180)", nullable: true }
        - { name: "code", type: "VARCHAR(180)", nullable: true }
        - { name: "client_id", type: "BIGINT UNSIGNED", nullable: true }
        - { name: "deleted", type: "TINYINT(1) UNSIGNED", constraints: ["NOT NULL"], default: 0 }
      foreign_keys:
        - { column: "client_id", references: "clients(id)", on_delete: "CASCADE", ref_origin: EXISTING }

    - name: "tracking_codes"
      origin: EXISTING
      description: "Platform tracking codes for cost centre / department tracking. Scoped per client and user."
      primary_key: "id"
      columns:
        - { name: "id", type: "INT(10) UNSIGNED", nullable: false, constraints: ["AUTO_INCREMENT"] }
        - { name: "unit", type: "VARCHAR(180)", nullable: true }
        - { name: "client_id", type: "BIGINT UNSIGNED", nullable: true }
        - { name: "user_id", type: "BIGINT UNSIGNED", nullable: true }
        - { name: "tracking_code_type_id", type: "INT(10) UNSIGNED", nullable: true }
        - { name: "deleted", type: "TINYINT(1) UNSIGNED", constraints: ["NOT NULL"], default: 0 }
      foreign_keys:
        - { column: "client_id", references: "clients(id)", on_delete: "CASCADE", ref_origin: EXISTING }
        - { column: "user_id", references: "users(id)", on_delete: "CASCADE", ref_origin: EXISTING }

    - name: "configurable_projects"
      origin: EXISTING
      description: "Client-configurable project records for expense tagging"
      primary_key: "id"
      columns:
        - { name: "id", type: "INT(10) UNSIGNED", nullable: false, constraints: ["AUTO_INCREMENT"] }
        - { name: "name", type: "VARCHAR(180)", nullable: true }
        - { name: "code", type: "VARCHAR(180)", nullable: true }
        - { name: "deleted", type: "TINYINT(1) UNSIGNED", constraints: ["NOT NULL"], default: 0 }

    - name: "file_store"
      origin: EXISTING
      description: "Platform file storage records (receipts, attachments)"
      primary_key: "id"
      columns:
        - { name: "id", type: "INT(10) UNSIGNED", nullable: false, constraints: ["AUTO_INCREMENT"] }
        - { name: "user_id", type: "BIGINT UNSIGNED", nullable: true }
        - { name: "uuid", type: "VARCHAR(36)", nullable: true }
        - { name: "file_type_id", type: "INT(10) UNSIGNED", nullable: true }
        - { name: "file_name", type: "VARCHAR(255)", constraints: ["NOT NULL"] }
        - { name: "file_extension", type: "VARCHAR(10)", constraints: ["NOT NULL"] }
        - { name: "deleted", type: "TINYINT(1) UNSIGNED", constraints: ["NOT NULL"], default: 0 }
      foreign_keys:
        - { column: "user_id", references: "users(id)", on_delete: "CASCADE", ref_origin: EXISTING }
        - { column: "file_type_id", references: "opt_file_type(id)", on_delete: "SET NULL", ref_origin: EXISTING }

    - name: "expense_additional_field"
      origin: EXISTING
      description: "Client-configurable additional fields for expenses"
      primary_key: "id"
      columns:
        - { name: "id", type: "INT(10) UNSIGNED", nullable: false, constraints: ["AUTO_INCREMENT"] }
        - { name: "client_id", type: "BIGINT UNSIGNED", nullable: true }
        - { name: "field_type", type: "VARCHAR(255)", constraints: ["NOT NULL"] }
        - { name: "label", type: "VARCHAR(100)", constraints: ["NOT NULL"] }
        - { name: "is_done", type: "TINYINT(1) UNSIGNED", constraints: ["NOT NULL"], default: 0 }
        - { name: "report_show", type: "TINYINT(1) UNSIGNED", constraints: ["NOT NULL"], default: 0 }
        - { name: "deleted", type: "TINYINT(1) UNSIGNED", nullable: false, default: 0 }
      foreign_keys:
        - { column: "client_id", references: "clients(id)", on_delete: "CASCADE", ref_origin: EXISTING }

    - name: "opt_file_type"
      origin: EXISTING
      description: "Lookup table for file types (referenced by file_store.file_type_id)"
      primary_key: "id"
      columns:
        - { name: "id", type: "INT(10) UNSIGNED", nullable: false, constraints: ["AUTO_INCREMENT"] }
        - { name: "option", type: "VARCHAR(128)", constraints: ["NOT NULL"], default: "" }

  csv_column_schema:
    source: "SD-OOP_Pocket_expense.json#csv_file_definition"
    origin: NEW
    description: "CSV template column definitions for batch upload"
    columns:
      - { index: 1, csv_column: "Date", target: "pocket_expense.date", required: true, format: "dd-mm-yyyy", validation: ["Required", "Not older than 3 years"] }
      - { index: 2, csv_column: "Expense Type", target: "opt_pocket_expense_type.option", required: true, validation: ["Must match dropdown values", "Determines amount sign"] }
      - { index: 3, csv_column: "Currency Code", target: "pocket_expense.currency", required: true, format: "3-letter ISO", validation: ["Must be in allowed currency list"], validated_against_origin: EXISTING }
      - { index: 4, csv_column: "Amount", target: "pocket_expense.amount", required: true, format: "decimal(14,2)", validation: ["Sign based on expense type"] }
      - { index: 5, csv_column: "{Currency} Equivalent Amount", target: "pocket_expense.user_converted_amount", required: false, validation: ["If present, must be numeric"], note: "Column not yet defined in pocket_expense table — spec references it as a target but column is absent from SD-OOP_Expense_single_data_capturing.json#database_schema. Do not add until resolved." }
      - { index: 6, csv_column: "VAT %", target: "pocket_expense.vat_amount", required: false, validation: ["Must be 0-100", "Strip % sign"] }
      - { index: 7, csv_column: "Merchant Name", target: "pocket_expense.merchant_name", required: true, validation: ["Max length per DB (VARCHAR 180)"] }
      - { index: 8, csv_column: "Description", target: "pocket_expense.merchant_description", required: false }
      - { index: 9, csv_column: "Merchant Address", target: "pocket_expense.merchant_address", required: false }
      - { index: 10, csv_column: "Merchant Country", target: "pocket_expense.merchant_country", required: false, validation: ["Must match country list"], validated_against_origin: EXISTING, note: "Column not yet defined in pocket_expense table — spec references it as a target but column is absent from SD-OOP_Expense_single_data_capturing.json#database_schema. Do not add until resolved." }
      - { index: 11, csv_column: "Source", target: "pocket_expense_source_client_config.name", required: false, validation: ["Must match client sources", "When Other, Source Note required"] }
      - { index: 12, csv_column: "Source Note", target: "pocket_expense_metadata", required: false, validation: ["Required when Source = Other"] }
      - { index: 13, csv_column: "Notes", target: "pocket_expense.notes", required: false, validation: ["DB limit", "Trim", "Prevent SQL injection"] }
    system_fields:
      - { target: "pocket_expense.user_id", source: "Selected user in UI", in_csv: false }
      - { target: "status", default: "submitted", in_csv: false }
      - { target: "created_by_user_id", source: "Logged-in user", in_csv: false }
      - { target: "updated_by_user_id, approved_by_user_id, timestamps, deleted flags", source: "Set internally", in_csv: false }

  api_routes:
    file: "routes/api.php"
    file_origin: EXISTING
    middleware:
      - name: "Oauth2UserClient"
        origin: EXISTING
        applied_at: "route group level via Route::middleware(['Oauth2UserClient'])"
        note: "Controllers MUST NOT call $this->middleware() in constructors — Oauth2UserClient is applied at the route group level only"
    endpoints:
      - method: "POST"
        path: "/api/uploads/pocket-expense/csv"
        origin: NEW
        controller: "PocketExpenseUploadController@uploadPocketExpenseCSV"
        note: "Route omits /v1 prefix per SD-OOP_Pocket_expense.json spec; dos_and_donts.pdf says 'usually under /v1' — this endpoint follows the spec as-is"
        content_type: "multipart/form-data"
        form_fields:
          - { name: "file", required: true, description: "CSV file containing expenses" }
          - { name: "user_id", required: true, description: "Current authenticated admin user" }
          - { name: "expense_user_id", required: true, description: "Target user for whom expenses are created" }
          - { name: "client_id", required: true, description: "Client context id" }
        server_side_validation:
          file: "required|file|mimes:csv,txt|max:10240"
          user_id: "required|exists:users,id"
          expense_user_id: "required|exists:users,id"
          client_id: "required|exists:clients,id"
        additional_checks:
          - "Header row presence and exact column names"
          - "expense_user_id belongs to client_id"
          - "Client has OOP feature enabled"
          - "user_id has permission to manage expense_user_id"
        response_success: "200 {success:true, message, upload_id, total_rows}"
        response_error: "422 {success:false, message, upload_id, total_rows, error_count, errors:[]}"

  response_schemas:
    error_response:
      origin: NEW
      http_status: 422
      structure:
        success: false
        message: "Validation failed"
        upload_id: "integer"
        total_rows: "integer"
        error_count: "integer"
        errors:
          - line_number: "integer (CSV line incl header)"
            field: "string (column name)"
            error: "string (error description)"
            value: "string (provided value)"

    success_response:
      origin: NEW
      http_status: 200
      structure:
        success: true
        message: "File validated successfully. Expenses created."
        upload_id: "integer"
        total_rows: "integer"

  controllers:
    - name: "PocketExpenseUploadController"
      origin: NEW
      location: "app/Http/Controllers/PocketExpenseUploadController.php"
      methods:
        - "uploadPocketExpenseCSV"

  services:
    - name: "PocketExpenseCSVValidator"
      origin: NEW
      location: "app/Services/PocketExpenseCSVValidator.php"
      constructor_args: ["targetUserId", "clientId", "adminId"]
      preloaded_reference_data:
        - { data: "Expense/transaction types", for_column: "Transaction Type", origin: NEW }
        - { data: "Supported currencies", for_column: "Currency Code", origin: EXISTING }
        - { data: "Supported countries", for_column: "Merchant Country", origin: EXISTING }
        - { data: "Expense sources for client", for_column: "Source", origin: NEW }

  jobs:
    - name: "ProcessExpenseUpload"
      origin: NEW
      location: "app/Jobs/ProcessExpenseUpload.php"
      description: "Syncs validated expense rows to main service in batches of 100"
      batch_size: 100

  models:
    - name: "PocketExpenseFileUpload"
      origin: NEW
      location: "app/Models/PocketExpenseFileUpload.php"
      table: "pocket_expense_file_uploads"
      traits: ["SoftDeletes"]

