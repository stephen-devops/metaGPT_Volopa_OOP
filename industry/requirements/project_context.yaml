# Project Context for OOP (Out-of-Pocket) Expense System
# Generated from SD-OOP_User_Management_System.json,
#   SD-OOP_Pocket_expense.json, SD-OOP_Expense_single_data_capturing.json
# Context: Project - feature-specific intent, rules, flows, and interfaces

metadata:
  project_name: "Volopa"
  version: "v1.0"
  sources:
    - "SD-OOP_User_Management_System.json"
    - "SD-OOP_Pocket_expense.json"
    - "SD-OOP_Expense_single_data_capturing.json"
  generated_date: "2026-02-11"

# =============================================================================
# 1. INTENT
# =============================================================================
intent:
  description: "Why the system exists and what success means"

  objectives:
    - "Enable employees to record out-of-pocket expenses incurred outside the Volopa card system"
    - "Provide a delegatable permission hierarchy so admins can manage expenses on behalf of users"
    - "Support both single-entry and CSV batch upload for expense data capturing"
    - "Deliver FX conversion so multi-currency expenses are normalised to the client wallet base currency"

  business_rationale:
    - "Employees incur business expenses through personal means (cash, personal cards) that need to be tracked alongside card transactions"
    - "Primary Admins need to delegate expense management to reduce bottleneck on a single approver"
    - "CSV batch upload supports operational efficiency for bulk historical or recurring expense entry"

  success_criteria:
    - "Users can create, view, edit, and delete their own out-of-pocket expenses"
    - "Admins can manage expenses for delegated users"
    - "CSV uploads of up to 200 rows are validated and processed atomically"
    - "FX conversion is automated with user-override capability"

# =============================================================================
# 2. REQUIREMENTS
# =============================================================================
requirements:
  description: "Externally observable behavior - what users and external systems can do"

  features:
    # --- User Management & Permissions ---
    - id: "REQ-001"
      name: "Service Enablement"
      source: "SD-OOP_User_Management_System.json#access_control_flow"
      description: "Sales/Ops enables OOP Expense feature for a client via Admin.Volopa"
      details:
        - "System validates client has card services active"
        - "Email notification sent to client Primary Admin"
        - "Default permissions applied automatically to all users under client"

    - id: "REQ-002"
      name: "Default Permission Assignment"
      source: "SD-OOP_User_Management_System.json#access_control_flow.default_permissions_once_enabled"
      description: "All users receive base permissions once OOP feature is enabled for the client"
      permissions_by_role:
        all_users: ["Add own expense", "Edit own expense", "View own expense"]
        administrator: ["Approve own expense"]
        primary_administrator:
          - "Add expense for all"
          - "Edit expense for all"
          - "View expense for all"
          - "Approve expense for all"
          - "Grant access to others"

    - id: "REQ-003"
      name: "Grant Management Rights"
      source: "SD-OOP_User_Management_System.json#access_control_flow.granting_managing_rights"
      description: "Primary Admin and Admin can delegate user management rights"
      details:
        - "Granted via Web App: Settings > Manage Users (existing UI)"
        - "Granted via Admin.Volopa: User accounts page (existing UI)"
        - "Managing access can be given to any user irrespective of role"

    - id: "REQ-004"
      name: "Managing User Expenses After Rights Granted"
      source: "SD-OOP_User_Management_System.json#access_control_flow.managing_user_once_rights_granted"
      description: "Users with management rights can manage expenses for their assigned users"
      permissions_by_role:
        card_user_and_business_user:
          - "Add expense for managed user"
          - "Edit expense for managed user"
          - "View expense for managed user"
        administrator:
          - "Add expense for managed user"
          - "Edit expense for managed user"
          - "View expense for managed user"
          - "Approve expense"
          - "Can grant access to others (only for managed users)"

    - id: "REQ-005"
      name: "Revoke Management Rights"
      source: "SD-OOP_User_Management_System.json#access_control_flow.revoking_managing_rights"
      description: "Primary Admin or Volopa Admin can revoke management rights"
      details:
        - "Revoked user loses add/edit/view/approve access to that specific user"
        - "Until another manager is set, the base user is managed by Primary Admin"

    # --- Single Expense Data Capturing ---
    - id: "REQ-006"
      name: "Single Expense Entry"
      source: "SD-OOP_Expense_single_data_capturing.json"
      description: "Users can create individual out-of-pocket expense records via a form"
      fields:
        - "Date (required)"
        - "Expense Type (required, from opt_pocket_expense_type)"
        - "Currency Code (required, 3-letter ISO)"
        - "Amount (required, signed based on expense type)"
        - "Merchant Name (required)"
        - "Merchant Description (optional)"
        - "Merchant Address (optional)"
        - "VAT % (optional, 0-100)"
        - "Notes (optional)"
        - "Source (optional, from client config)"
        - "Source Note (required when Source = Other)"

    - id: "REQ-007"
      name: "Expense Source Configuration"
      source: "SD-OOP_Expense_single_data_capturing.json#oop_expense_source"
      description: "Client-configurable expense source dropdown"
      details:
        - "3 default sources auto-created on feature enable: Cash, Corporate Card, Personal Card"
        - "1 global 'Other' record (client_id = NULL), not deletable or editable"
        - "Clients can add up to 20 active custom sources"
        - "Soft-deleted sources remain visible on historical expenses"
        - "When Source = Other, user must provide free-text Source Note"

    - id: "REQ-008"
      name: "FX Currency Conversion"
      source: "SD-OOP_Expense_single_data_capturing.json#fx_conversion_flow"
      description: "Automatic FX conversion when expense currency differs from wallet base currency"
      details:
        - "Triggered after user enters Date + Currency + Amount (with 2s debounce)"
        - "System identifies wallet base currency via /wallet-ccy-value endpoint"
        - "Gets dated FX rate with max 30-day lookback"
        - "Applies client commission: AdjustedRate = BaseRate x (1 - Comm%)"
        - "Frontend populates converted amount; user can override"
        - "Backend recalculates FX on form submit"

    - id: "REQ-009"
      name: "Expense Metadata Capture"
      source: "SD-OOP_Expense_single_data_capturing.json#database_schema.tables[pocket_expense_metadata]"
      description: "Flexible metadata attached to each expense record"
      metadata_types:
        - "category (linked to existing transaction_category)"
        - "tracking_code_type_1 (linked to existing tracking_codes)"
        - "tracking_code_type_2 (linked to existing tracking_codes)"
        - "project (linked to existing configurable_projects)"
        - "additional_field (linked to existing expense_additional_field)"
        - "file (linked to existing file_store - receipts)"
        - "expense_source (linked to new pocket_expense_source_client_config)"

    # --- CSV Batch Upload ---
    - id: "REQ-010"
      name: "CSV Batch Upload"
      source: "SD-OOP_Pocket_expense.json#overview"
      description: "Admin uploads a CSV file of expenses for a selected user"
      details:
        - "Admin selects target user from dropdown (managed users only; all for Primary Admin)"
        - "Business/Card User context defaults to logged-in user"
        - "Downloadable CSV template with defined column headers"
        - "Max 200 rows per file"
        - "Synchronous validation, all-or-nothing creation"

    - id: "REQ-011"
      name: "CSV Validation Error Display"
      source: "SD-OOP_Pocket_expense.json#error_response"
      description: "Detailed error feedback for failed CSV uploads"
      details:
        - "Each error shows: line number, field name, error reason, provided value"
        - "Errors downloadable as CSV for user reference"
        - "Errors stored in pocket_expense_file_uploads.validation_errors as JSON"

    - id: "REQ-012"
      name: "Batch Upload Notification"
      source: "SD-OOP_Pocket_expense.json#file_processing.steps[5]"
      description: "Notification issued to target user/admin after successful batch creation"
      details:
        - "Channel TBD: in-app and/or email"

  user_journeys:
    - id: "UJ-001"
      name: "Single Expense Creation"
      steps:
        - step: 1
          action: "User navigates to Out-of-Pocket Expenses"
        - step: 2
          action: "User fills expense form (date, type, currency, amount, merchant, etc.)"
        - step: 3
          action: "System auto-converts FX if currency differs from wallet base"
        - step: 4
          action: "User optionally overrides converted amount"
        - step: 5
          action: "User submits; expense saved with status 'draft' or 'submitted'"

    - id: "UJ-002"
      name: "CSV Batch Upload Journey"
      source: "SD-OOP_Pocket_expense.json#end_to_end_flow"
      steps:
        - step: 1
          action: "User navigates to Out-of-Pocket Expenses Batch Upload"
        - step: 2
          action: "User selects target user from dropdown"
        - step: 3
          action: "User downloads CSV template, fills it, uploads completed file"
        - step: 4
          action: "System performs basic file checks (size, extension)"
        - step: 5
          action: "System parses CSV and validates all rows"
          outcome_success: "Expense records created, success message returned"
          outcome_failure: "No records created, error list displayed per line"
        - step: 6
          action: "On error, user can review errors and download as CSV"

  inherited_behaviors:
    - "All API endpoints require OAuth2 authentication via Oauth2UserClient interface as middleware"
    - "All data is scoped to a client (multi-tenancy)"
    - "User roles (Primary Admin, Admin, Business User, Card User) are platform-wide"
    - "Feature enablement is controlled via Sales/Ops through Admin.Volopa"
    - "User management is accessible via Settings > Manage Users in the Web App"
    - "Currency and country lists are platform-managed master data"
    - "File storage uses platform storage infrastructure"
    - "FX conversion is available as platform infrastructure"

# =============================================================================
# 3. CONSTRAINTS
# =============================================================================
constraints:
  description: "Hard rules that restrict solution space"

  file_constraints:
    - "Maximum 200 rows per CSV file"
    - "File format: CSV or TXT with CSV content"
    - "File size: max 10MB (10240 KB)"
    - "Header row mandatory and must exactly match column names"

  validation_constraints:
    - "All-or-nothing: if any row fails validation, no expenses are created"
    - "Date must not be older than 3 years"
    - "Date format: DD/MM/YYYY (DD-MM-YYYY in template)"
    - "Currency Code must be 3-letter ISO and in allowed list"
    - "Amount sign determined by expense type (Refund = positive, others = negative)"
    - "VAT % must be numeric between 0-100 (strip % sign)"
    - "Source must match configured sources for client (including global Other)"
    - "Source Note required when Source = Other"
    - "Merchant Name max length per DB definition (VARCHAR 180)"
    - "Notes: trim and prevent SQL injection, follow DB limit"

  permission_constraints:
    - "Only Primary Admin has full access to all users by default"
    - "Admin gets full access only to own expenses by default; needs explicit grant for others"
    - "Business User and Card User cannot approve expenses even with management rights"
    - "Managing access can be given to any user irrespective of role"
    - "Admin can only grant access to their own managed users (not all users)"

  expense_source_constraints:
    - "Maximum 20 active expense sources per client"
    - "Unique source names per client (client_id, name)"
    - "Global 'Other' record (client_id = NULL) is not deletable or editable"
    - "Soft-deleted sources excluded from future dropdowns but visible on historical records"
    - "3 defaults auto-created on feature enable: Cash, Corporate Card, Personal Card"

  fx_constraints:
    - "FX rate lookup: max 30-day lookback from expense date"
    - "If no FX rate found, return 'No FX Available'"
    - "Backend must recalculate FX on save (do not trust frontend-only value)"
    - "Commission formula: AdjustedRate = BaseRate x (1 - Comm%)"

  data_model_constraints:
    - rule: "Tables with similar columns across modules are DISTINCT entities with different column types, status enums, and relationships. Each MUST have its own Model and Migration and Factory. Do NOT merge or conflate tables from different modules."
      example: "oop_expenses (User Management) and pocket_expense (Single Data Capturing) are separate tables despite both storing expense data."
    - rule: "When tables track both a target user and the performing admin, DB column names and API form field names may differ. Refer to database_tables and api_routes for exact column-to-field mappings. Do NOT assume DB column names match API form field names."
      example: "pocket_expense_file_uploads: DB column 'created_by_user_id' maps to API form field 'user_id' (admin); DB column 'user_id' maps to API form field 'expense_user_id' (target user)."

  design_output_constraints:
    description: "Rules ensuring consistency across design document sections (File list, Class diagram, Sequence diagram)"
    rules:
      - id: "DOC-001"
        scope: "classDiagram"
        rule: "Every file in the 'File List' that defines a class (model, controller, service, request, resource, job, policy, factory) MUST have a corresponding class entry in the 'Data structures and interfaces' classDiagram. Do NOT omit any classes."
      - id: "DOC-002"
        scope: "sequenceDiagram"
        rule: "Every Controller and Service class from the classDiagram MUST appear as a participant in at least one sequence flow in the 'Program call flow' sequenceDiagram."
      - id: "DOC-003"
        scope: "sequenceDiagram"
        rule: "Include a SEPARATE labelled sequence flow for EACH distinct domain: user permission management, single expense CRUD with FX conversion, and CSV batch upload with background processing. No domain may be omitted."

# 4. FLOWS
# =============================================================================
flows:
  description: "Dynamic behavior and sequencing"

  # ---------------------------------------------------------------------------
  # Platform Flow Touchpoints (origin: EXISTING)
  # These are existing platform flows that project-specific flows interact with.
  # ---------------------------------------------------------------------------
