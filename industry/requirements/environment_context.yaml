  # ---------------------------------------------------------------------------
  # FX Query Contract
  # ---------------------------------------------------------------------------
  fx_query_contract:
    description: "The join chain used to determine a client's wallet base currency"
    origin: EXISTING
    source: "SD-OOP_Expense_single_data_capturing.json#currency_conversion"
    join_chain:
      - { step: 1, table: "prepaid_card", join_to: "prepaid_card_tier_map", on: "card_id" }
      - { step: 2, table: "prepaid_card_tier_map", join_to: "account_tier", on: "tier_id" }
      - { step: 3, table: "account_tier", join_to: "account", on: "account_id" }
      - { step: 4, table: "account", join_to: "currency", on: "currency_id" }
    filter_conditions:
      - "client_id = {target_client_id}"
      - "prepaid_card.master_virtual_card = 1"
      - "prepaid_card.deleted = 0"
    returned_fields:
      - "client_id"
      - "account_base_currency_id"
      - "account_base_currency_code"
      - "tier_base_currency_id"
      - "tier_base_currency_code"
      - "card_currency"
