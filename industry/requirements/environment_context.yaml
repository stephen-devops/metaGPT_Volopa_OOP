# Environment Context for Volopa Platform (OOP Expense Perspective)
# Extracted from existing/platform-level references in:
#   SD-OOP_User_Management_System.json
#   SD-OOP_Pocket_expense.json
#   SD-OOP_Expense_single_data_capturing.json
# Context: Environment - stable, cross-project rules, standards, and platform constraints
#
# This file covers 4 of the 5 canonical dimensions:
#   Intent, Constraints, Decisions, Interfaces
# The 5th dimension (Flows) is always project-scoped — see project_context.yaml.
#
# The Interfaces dimension (existing platform tables, models, middleware,
#   endpoints, infrastructure) was previously in environment_artifacts.yaml.
# Those symbols are now indexed in a live OpenSearch RAG repository;
#   the canonical listing is kept here for documentation and fallback.

metadata:
  platform_name: "Volopa"
  version: "1.0"
  sources:
    - "SD-OOP_User_Management_System.json"
    - "SD-OOP_Pocket_expense.json"
    - "SD-OOP_Expense_single_data_capturing.json"
    - "dos_and_donts.pdf"
  generated_date: "2026-02-11"
  note: "This captures platform-level intent, constraints, decisions, and interfaces. Existing platform symbols (tables, models, middleware, endpoints) are now indexed in the live OpenSearch RAG repository; the Interfaces dimension below serves as canonical documentation and fallback. Flows (dynamic behavior/sequencing) are always project-specific — see project_context.yaml."

# =============================================================================
# 1. INTENT
# =============================================================================
intent:
  description: "Platform-level purpose and standards"

  platform_purpose: "Volopa is a business payment and expense management platform providing card services, FX, and financial operations for corporate clients"

  mental_model:
    description: "Laravel API structure mental model"
    source: "dos_and_donts.pdf"
    flow: "Client -> route (versioned, throttled, auth) -> controller -> Form Request (validation + policy) -> domain logic (services/models/transactions) -> API Resource (shape output) -> JSON with correct status codes and error format"

  design_principles:
    - "Multi-tenant: all operations scoped by client_id"
    - "Role-based access: hierarchical user roles with delegatable permissions"
    - "Card-centric: platform assumes card services as a prerequisite for expense features"
    - "Soft-delete pattern: preserve historical data while hiding from active views"

# =============================================================================
# 2. CONSTRAINTS
# =============================================================================
constraints:
  description: "Hard rules that restrict solution space - platform-level standards"

  # ---------------------------------------------------------------------------
  # DOS AND DONTS (from dos_and_donts.pdf)
  # These are mandatory platform-wide coding standards. All projects must comply.
  # ---------------------------------------------------------------------------
  dos_and_donts:
    source: "dos_and_donts.pdf"

    prerequisites:
      - "The developer needs to be familiar with Laravel API structure and use the mental model defined in intent.mental_model"
      - "The developer needs to understand the specs and create a plan of action"

    dos:
      routing:
        - "Add routes to routes/api.php, usually under /v1 and OAuth2 middleware"
        - "Keep names consistent (api.v1.posts.favorite.store, etc.)"

      data_shape:
        - "New tables? Write migrations and factories"
        - "Add relationships on models"
        - "Indexes/uniques/foreign keys"

      validation_and_authorization:
        - "Validate request content"
        - "Use Policies (or Gates) for permissions"

      controller_logic:
        - "Keep controllers thin; push logic into model/service"
        - "Use transactions when touching multiple tables"
        - "Return proper status codes (201, 204, 400, 401, 403, 404, 422)"

      resources:
        - "Create an API Resource to shape responses and hide internal fields"
        - "Add pagination using Resource::collection($query->paginate())"

      testing:
        - "Assert JSON shape, status codes, DB state, and policy enforcement"

      authentication:
        - "Volopa uses custom authorization processes via middlewares for OAuth2 type access tokens or WSSE credentials"

    donts:
      code_integrity:
        - constraint: "Don't use a class or a method that doesn't exist in the current repository or was not defined in the added code"
          verification: "rag_symbol_lookup"
          failure_mode: "Block generation"
        - constraint: "Don't add methods that already exist in the current repository"
          verification: "rag_collision_check"
          failure_mode: "Block generation"

      api_patterns:
        - "Don't return raw Eloquent models"
        - "Don't use session/redirect patterns in APIs"
        - "Don't return 200 for errors"
        - "Don't respond with inconsistent shapes/casing"

      security:
        - "Don't expose stack traces or sensitive error details"
        - "Don't disable mass-assignment protection or trust client-owned fields"
        - "Don't build query filters directly from user input"
        - "Don't leak environment or config"

      performance:
        - "Don't create N+1 queries (especially in Resources)"
        - "Don't return unbounded lists"
        - "Don't ignore caching"
        - "Don't let file uploads bloat the API process"

      data_integrity:
        - "Don't forget transactions for multi-write operations"
        - "Don't hardcode timestamps/timezones"

      observability:
        - "Don't forget observability"

  # ---------------------------------------------------------------------------
  # PLATFORM CONSTRAINTS (derived from OOP Expense spec references)
  # These are inferred from existing patterns observed across the JSON specs.
  # ---------------------------------------------------------------------------
  
  multi_tenancy:
    - rule: "All queries and mutations must be scoped by client_id"
      evidence: "Every new table includes client_id as NOT NULL or foreign key"
    - rule: "user_id must match authenticated user (server-side check)"
      referenced_in: "SD-OOP_Pocket_expense.json#security_and_permissions"
    - rule: "Target entities (e.g. expense_user_id) must belong to the same client_id"
      referenced_in: "SD-OOP_Pocket_expense.json#api_contract.additional_checks"

  soft_delete_pattern:
    description: "Platform-standard pattern for logical deletion"
    variants:
      - name: "Flag-based soft delete"
        columns: ["deleted TINYINT(1) DEFAULT 0", "delete_time DATETIME DEFAULT NULL"]
        convention: "Set deleted = 1 and delete_time = NOW()"
      - name: "Laravel SoftDeletes trait"
        columns: ["deleted_at TIMESTAMP DEFAULT NULL"]
        convention: "Standard Eloquent SoftDeletes trait"
    note: "Both patterns coexist in the platform; new tables should match the convention of the service they belong to"
    see: "project_context.yaml#interfaces.database_tables for which OOP Expense tables use which variant"

  timestamp_pattern:
    description: "Platform-standard timestamp conventions"
    variants:
      - name: "Volopa legacy style"
        columns: ["create_time DATETIME DEFAULT CURRENT_TIMESTAMP", "update_time DATETIME DEFAULT NULL ON UPDATE CURRENT_TIMESTAMP"]
      - name: "Laravel standard style"
        columns: ["created_at TIMESTAMP DEFAULT NULL", "updated_at TIMESTAMP DEFAULT NULL"]
    note: "New tables should match the timestamp convention of the service/database they reside in"
    see: "project_context.yaml#interfaces.database_tables for which OOP Expense tables use which variant"

  database_engine:
    - rule: "InnoDB engine required"
      referenced_in: "SD-OOP_Pocket_expense.json#data_model.new_table"
    - rule: "Character set: utf8mb4"
    - rule: "Collation: utf8mb4_unicode_ci"

  # ---------------------------------------------------------------------------
  # LARAVEL TASK CONVENTIONS (for task breakdown and dependency ordering)
  # These define how system designs are decomposed into implementation tasks.
  # ---------------------------------------------------------------------------
  laravel_task_conventions:
    description: "Laravel-specific conventions for breaking down system designs into ordered, dependency-aware implementation tasks"

    execution_order_priority:
      description: "Priority tiers for Task list ordering. Lower P-number = must be implemented first."
      tiers:
        - { priority: "P0", artifact: "Migrations (database schema)", dependencies: "none" }
        - { priority: "P0.5", artifact: "Factories (test data)", dependencies: "migrations" }
        - { priority: "P1", artifact: "Models (Eloquent)", dependencies: "migrations" }
        - { priority: "P2", artifact: "Policies (authorization)", dependencies: "models" }
        - { priority: "P3", artifact: "FormRequests (validation)", dependencies: "policies" }
        - { priority: "P4", artifact: "Config files (config/*.php)", dependencies: "none" }
        - { priority: "P5", artifact: "Services (business logic)", dependencies: "models" }
        - { priority: "P6", artifact: "Queue Jobs", dependencies: "services" }
        - { priority: "P7", artifact: "Notifications", dependencies: "models" }
        - { priority: "P8", artifact: "Middleware", dependencies: "none" }
        - { priority: "P9", artifact: "Resources (transformers)", dependencies: "models" }
        - { priority: "P10", artifact: "Controllers (thin layer)", dependencies: "services + FormRequests + Resources" }
        - { priority: "P11", artifact: "Routes (routes/api.php)", dependencies: "controllers" }
        - { priority: "P12", artifact: "Tests (feature tests)", dependencies: "all application code" }

    parallel_development_opportunities:
      description: "Artifacts that can be developed in parallel when no inter-dependencies exist"
      parallelisable:
        - "Multiple migrations (if no FK dependencies between them)"
        - "Multiple factories (each factory is independent)"
        - "Multiple models (if no cross-relationships)"
        - "Multiple FormRequests"
        - "Multiple services (if no inter-service dependencies)"
        - "Multiple API Resources"

    critical_dependencies:
      description: "Key dependency relationships to document in Logic Analysis"
      rules:
        - "Controllers depend on: Services + FormRequests + Resources"
        - "Services depend on: Models"
        - "FormRequests depend on: Policies (for authorize method)"
        - "Policies depend on: Models"
        - "Factories depend on: Migrations (table must exist for factory definition)"
        - "Tests depend on: All application code + Factories (for test data seeding)"

    composer_packages:
      description: "List any Laravel Composer packages needed in Required packages"

    derivation_rules:
      description: "Rules for deriving implementation artifacts from YAML context"
      rules:
        - "Create ONE Migration and ONE Factory per new table"
        - "Create ONE Eloquent Model per new table (snake_case table -> PascalCase model)"
        - "Create ONE Policy per module that needs authorization"
        - "Create ONE FormRequest per API endpoint"
        - "Create ONE Service per domain operation (CRUD, validation, conversion, config)"
        - "Create ONE API Resource per model returned in responses"
        - "Create ONE Controller per API resource group (thin, delegates to services)"
        - "Create Queue Jobs only where context specifies background processing"

  status_codes:
    source: "dos_and_donts.pdf (controller logic)"
    success:
      - { code: 200, meaning: "OK - successful retrieval or operation" }
      - { code: 201, meaning: "Created - successful creation" }
      - { code: 204, meaning: "No Content - successful deletion" }
    client_error:
      - { code: 400, meaning: "Bad Request" }
      - { code: 401, meaning: "Unauthorized" }
      - { code: 403, meaning: "Forbidden" }
      - { code: 404, meaning: "Not Found" }
      - { code: 422, meaning: "Unprocessable Entity - validation failed" }

  # ---------------------------------------------------------------------------
  # VERIFICATION PROTOCOL (Mandatory pre-generation CHECK PLAN)
  # Injected into LaravelEngineer and (optionally) LaravelArchitect prompts.
  # ---------------------------------------------------------------------------
  verification_protocol:
    description: "Before generating any design or code, the agent MUST produce a CHECK PLAN listing every symbol it intends to reference, with origin classification and evidence from the RAG repository."
    applies_to: ["LaravelEngineer", "LaravelArchitect"]

    output_format:
      description: "Strict output ordering — the CHECK PLAN must be the first output before any design or code."
      sequence:
        - "1) CHECK PLAN (must be the first output)"
        - "2) (After all checks complete and gate passes) Proceed with the main task output"
      rule: "The first output must be a CHECK PLAN. No tool calls, code, or design are permitted before this."

    protocol_rules:
      - "Before generating any design or code, you MUST produce a CHECK PLAN."
      - "A CHECK PLAN lists every class, model, controller, service, job, policy, form request, resource, migration, route, table, and queue name you intend to reference."
      - "For each item, set Origin to one of: EXISTING, NEW, UNKNOWN."
      - "Every UNKNOWN must be resolved to EXISTING or NEW via a RAG query before any generation begins."
      - "Do NOT generate any design or code until all items in the CHECK PLAN are classified and evidence is cited."

    origin_rules:
      EXISTING:
        definition: "Symbol already exists in the repository or platform"
        action: "MUST cite RAG evidence: symbol_name, symbol_type, file_path, and key type_data fields returned by rag_symbol_lookup"
        verification: "rag_symbol_lookup"
        query: '{"query":{"bool":{"must":[{"term":{"symbol_name.keyword":"<NAME>"}},{"term":{"symbol_type":"<TYPE>"}}]}}}'
        evidence_required: "symbol_type + file_path + type_data summary from the RAG hit"
      NEW:
        definition: "Symbol is introduced by this project/change"
        action: "MUST declare the target file path and verify no collision via rag_collision_check (expect 0 hits)"
        verification: "rag_collision_check"
        query: '{"query":{"term":{"symbol_name.keyword":"<NAME>"}}}'
        evidence_required: "target file path + 0 hits confirmation from RAG"
      UNKNOWN:
        definition: "Origin not yet determined — must be resolved before proceeding"
        action: "MUST perform rag_symbol_lookup to resolve to EXISTING (hit found) or NEW (0 hits + collision check passes)"
        verification: "rag_symbol_lookup"
        query: '{"query":{"term":{"symbol_name.keyword":"<NAME>"}}}'
        evidence_required: "RAG lookup result that resolves to EXISTING (with hit details) or NEW (with 0-hit confirmation)"

    blocking_rule: "Do NOT generate any design or code until ALL items in the CHECK PLAN have been resolved (no UNKNOWN remaining) and RAG evidence is cited for every EXISTING and NEW symbol."

    gate_failure_behavior:
      description: "What happens when the evidence-gated verification loop detects failures."
      rules:
        - "If ANY CHECK PLAN item fails verification (EXISTING not found, or NEW collides), the gate FAILS."
        - "On FAIL: the orchestrator re-prompts the agent with the specific failures and instructs it to correct its CHECK PLAN classifications."
        - "The agent gets up to 3 total attempts (1 initial + 2 retries) to produce a passing CHECK PLAN."
        - "If the gate still fails after all attempts, code generation is BLOCKED entirely — no code is produced."
      fail_conditions:
        - origin: "EXISTING"
          rag_result: "NOT found"
          verdict: "FAIL — UNVERIFIED: symbol may not exist in the repository"
        - origin: "NEW"
          rag_result: "found"
          verdict: "FAIL — COLLISION: name already taken by an existing symbol"
      pass_conditions:
        - origin: "EXISTING"
          rag_result: "found"
          verdict: "PASS — verified in repository"
        - origin: "NEW"
          rag_result: "NOT found"
          verdict: "PASS — safe to create"
        - origin: "UNKNOWN"
          rag_result: "found"
          verdict: "PASS — reclassify to EXISTING"
        - origin: "UNKNOWN"
          rag_result: "NOT found"
          verdict: "PASS — reclassify to NEW"

    rag_repository:
      index: "volopa_platform_symbols"
      host: "localhost:9200"
      description: "OpenSearch index containing all EXISTING platform symbols from input YAML content"
      indexed_symbol_types:
        - database_table
        - eloquent_model
        - middleware
        - endpoint
        - infrastructure
        - user_role
        - reference_data
        - route_file
        - ui_path
      document_schema:
        symbol_name: "Unique symbol identifier (e.g. 'users', 'User', 'Oauth2UserClient', 'routes/api.php')"
        symbol_type: "One of the indexed_symbol_types above"
        origin: "EXISTING or UNKNOWN (NEW symbols are not indexed)"
        file_path: "Source file path if known, null if not applicable, 'UNKNOWN' if applicable but undeclared"
        description: "Human-readable description of the symbol"
        source_spec: "YAML source reference where the symbol was defined"
        type_data: "Nested object keyed by symbol_type containing type-specific fields (columns, relationships, capabilities, etc.)"
        unresolved: "Boolean — true if origin is UNKNOWN or has unresolved notes"
        unresolved_ref: "Reference to the unresolved decision (e.g. project_context.yaml#decisions.unresolved[DEC-UNRESOLVED-004])"

    query_patterns:
      rag_symbol_lookup:
        description: "Look up a known or suspected EXISTING symbol by name and optionally type"
        by_name: '{"query":{"term":{"symbol_name.keyword":"<NAME>"}}}'
        by_name_and_type: '{"query":{"bool":{"must":[{"term":{"symbol_name.keyword":"<NAME>"}},{"term":{"symbol_type":"<TYPE>"}}]}}}'
        hit_means: "Symbol is EXISTING — cite file_path, symbol_type, and type_data from the hit"
        no_hit_means: "Symbol is not in the repo — classify as NEW (after collision check)"
      rag_collision_check:
        description: "Verify a NEW symbol name does not collide with any existing symbol"
        query: '{"query":{"term":{"symbol_name.keyword":"<NAME>"}}}'
        zero_hits: "No collision — safe to create as NEW"
        nonzero_hits: "Collision detected — the symbol already exists; reclassify as EXISTING"

    check_plan_format:
      description: "Expected format of the CHECK PLAN the agent must produce. Each line must cite RAG evidence."
      example: |
        CHECK PLAN
        - PocketExpenseFileUpload      -> NEW       -> rag_collision_check("PocketExpenseFileUpload") -> 0 hits, create at app/Models/PocketExpenseFileUpload.php
        - PocketExpenseUploadController -> NEW      -> rag_collision_check("PocketExpenseUploadController") -> 0 hits, create at app/Http/Controllers/PocketExpenseUploadController.php
        - PocketExpenseCSVValidator     -> NEW       -> rag_collision_check("PocketExpenseCSVValidator") -> 0 hits, create at app/Services/PocketExpenseCSVValidator.php
        - User (eloquent_model)         -> EXISTING  -> rag_symbol_lookup("User", "eloquent_model") -> 1 hit, file_path: UNKNOWN, table: users
        - Oauth2UserClient (middleware) -> EXISTING  -> rag_symbol_lookup("Oauth2UserClient", "middleware") -> 1 hit, file_path: UNKNOWN, applied_to: routes/api.php
        - users (database_table)        -> EXISTING  -> rag_symbol_lookup("users", "database_table") -> 1 hit, file_path: null, columns: [id, name, email, ...]
        - routes/api.php (route_file)   -> EXISTING  -> rag_symbol_lookup("routes/api.php", "route_file") -> 1 hit, file_path: routes/api.php, note: "append, not replace"
        - pocket_expense_file_uploads   -> NEW       -> rag_collision_check("pocket_expense_file_uploads") -> 0 hits, defined in project_context.yaml#interfaces.database_tables
        - ProcessExpenseUpload (job)    -> NEW       -> rag_collision_check("ProcessExpenseUpload") -> 0 hits, create at app/Jobs/ProcessExpenseUpload.php

# =============================================================================

# =============================================================================
# 3. DECISIONS
# =============================================================================
decisions:
  description: "Platform-level architectural decisions that all projects inherit"

  platform_decisions:
    - id: "ENV-DEC-001"
      decision: "Laravel framework"
      rationale: "Standard PHP framework for all Volopa services"

    - id: "ENV-DEC-002"
      decision: "OAuth2/WSSE authentication via custom middleware"
      rationale: "Secure API access with token-based auth; custom Oauth2 middleware on all API routes"

    - id: "ENV-DEC-003"
      decision: "Queue-based async processing for long-running tasks"
      rationale: "Prevent API process blocking; file uploads and batch operations use background jobs"

    - id: "ENV-DEC-004"
      decision: "API Resources for response shaping"
      rationale: "Consistent response format; hide internal model fields from API consumers"

    - id: "ENV-DEC-005"
      decision: "Form Request classes for validation"
      rationale: "Centralised validation with policy enforcement; separation from controller logic"

    - id: "ENV-DEC-006"
      decision: "Multi-tenant architecture scoped by client_id"
      rationale: "All data and operations are isolated per client; enforced via FK constraints and query scoping"

    - id: "ENV-DEC-007"
      decision: "Soft delete for data preservation"
      rationale: "Historical data must remain queryable for audit, reporting, and referential integrity. Two variants coexist (flag-based and Laravel SoftDeletes)."

    - id: "ENV-DEC-008"
      decision: "MySQL/InnoDB with utf8mb4 encoding"
      rationale: "ACID compliance, foreign key support, full Unicode character support"

    - id: "ENV-DEC-009"
      decision: "Eloquent ORM with explicit model relationships"
      rationale: "Standard Laravel data access layer; relationships defined on models; factories for testing"

    - id: "ENV-DEC-010"
      decision: "Centralised master data for currencies, countries, and reference lookups"
      rationale: "Single source of truth for validation; prevents data inconsistency across features"
      evidence: "OOP Expense validates Currency Code and Merchant Country against existing platform lists"

  unresolved:
    - id: "ENV-DEC-UNRESOLVED-002"
      area: "Audit logging"
      question: "Is there a platform-standard audit logging mechanism (e.g. Laravel activity log, event sourcing, dedicated audit table) or is this project-specific?"
      see: "project_context.yaml#decisions.unresolved[DEC-UNRESOLVED-003] for the project-specific audit logging question"

    - id: "ENV-DEC-UNRESOLVED-003"
      area: "Soft delete convention"
      question: "Which soft delete pattern should new tables use - flag-based (deleted + delete_time) or Laravel SoftDeletes (deleted_at)? Both appear in the specs."

    - id: "ENV-DEC-UNRESOLVED-004"
      area: "Table naming convention"
      question: "Specs reference both 'clients(id)' and 'client(id)', and both 'users(id)' and 'user(id)'. What is the actual table name convention - singular or plural?"

# =============================================================================
# 4. INTERFACES (Existing Platform Tables, Models, Middleware, Endpoints, Infra)
# =============================================================================
# Previously in environment_artifacts.yaml (RAG substitute).
# These symbols are now indexed in the live OpenSearch RAG repository
# (volopa_platform_symbols). This section serves as canonical documentation
# and fallback reference.
interfaces:
  description: "Structural contracts and schemas - existing platform tables, services, and infrastructure"

  # ---------------------------------------------------------------------------
  # Existing Database Tables
  # ---------------------------------------------------------------------------
  existing_database_tables:
    description: "Platform tables referenced by OOP Expense specs via foreign keys or queries"

    core_identity:
      - name: "users"
        origin: EXISTING
        description: "Platform user table - all user roles"
        type: "Database Table"
        referenced_in:
          - "SD-OOP_User_Management_System.json#er_diagram (FK target)"
          - "SD-OOP_User_Management_System.json#database_schema (FK: user_id, grantor_id, manager_user_id)"
          - "SD-OOP_Expense_single_data_capturing.json#database_schema (FK: user_id, created_by_user_id, approved_by_user_id)"
          - "SD-OOP_Pocket_expense.json#api_contract (exists validation: user_id, expense_user_id)"
        key_columns_used:
          - { column: "id", type: "BIGINT UNSIGNED / INT(11) UNSIGNED", note: "Referenced as FK by multiple new tables" }

      - name: "clients"
        origin: EXISTING
        description: "Platform client/company table - multi-tenancy anchor"
        type: "Database Table"
        referenced_in:
          - "SD-OOP_User_Management_System.json#er_diagram (FK target)"
          - "SD-OOP_User_Management_System.json#database_schema (FK: client_id)"
          - "SD-OOP_Expense_single_data_capturing.json#database_schema (FK: client_id)"
          - "SD-OOP_Pocket_expense.json#api_contract (exists validation: client_id)"
        key_columns_used:
          - { column: "id", type: "BIGINT UNSIGNED / INT(10) UNSIGNED", note: "Referenced as FK by all new tables" }
        note: "Specs reference both 'clients(id)' and 'client(id)' - likely the same table with inconsistent naming"

      - name: "features"
        origin: EXISTING
        description: "Platform feature registry - tracks available features per client"
        type: "Database Table"
        referenced_in:
          - "SD-OOP_User_Management_System.json#er_diagram (FK target)"
          - "SD-OOP_User_Management_System.json#database_schema (FK: feature_id)"
        key_columns_used:
          - { column: "id", type: "BIGINT UNSIGNED", note: "OOP Expense is feature_id = 16 based on example data" }

    metadata_references:
      - name: "transaction_category"
        origin: EXISTING
        description: "Platform transaction categorisation table"
        type: "Database Table"
        referenced_in: "SD-OOP_Expense_single_data_capturing.json#database_schema.pocket_expense_metadata (FK: transaction_category_id)"
        key_columns_used:
          - { column: "id", type: "INT(10) UNSIGNED" }

      - name: "tracking_codes"
        origin: EXISTING
        description: "Platform tracking code table for cost centre / department tracking"
        type: "Database Table"
        referenced_in: "SD-OOP_Expense_single_data_capturing.json#database_schema.pocket_expense_metadata (FK: tracking_code_id)"
        key_columns_used:
          - { column: "id", type: "INT(10) UNSIGNED" }

      - name: "configurable_projects"
        origin: EXISTING
        description: "Platform project configuration table"
        type: "Database Table"
        referenced_in: "SD-OOP_Expense_single_data_capturing.json#database_schema.pocket_expense_metadata (FK: project_id)"
        key_columns_used:
          - { column: "id", type: "INT(10) UNSIGNED" }

      - name: "file_store"
        origin: EXISTING
        description: "Platform file storage reference table (for receipts, attachments)"
        type: "Database Table"
        referenced_in: "SD-OOP_Expense_single_data_capturing.json#database_schema.pocket_expense_metadata (FK: file_store_id)"
        key_columns_used:
          - { column: "id", type: "INT(10) UNSIGNED" }

      - name: "expense_additional_field"
        origin: EXISTING
        description: "Platform configurable additional fields for expenses"
        type: "Database Table"
        referenced_in: "SD-OOP_Expense_single_data_capturing.json#database_schema.pocket_expense_metadata (FK: additional_field_id)"
        key_columns_used:
          - { column: "id", type: "INT(10) UNSIGNED" }

    fx_and_card_infrastructure:
      - name: "prepaid_card"
        origin: EXISTING
        description: "Card records; used to determine client wallet base currency"
        type: "Database Table"
        referenced_in: "SD-OOP_Expense_single_data_capturing.json#currency_conversion"
        filter_conditions: ["master_virtual_card = 1", "deleted = 0"]

      - name: "prepaid_card_tier_map"
        origin: EXISTING
        description: "Mapping between cards and account tiers"
        type: "Database Table"
        referenced_in: "SD-OOP_Expense_single_data_capturing.json#currency_conversion"

      - name: "account_tier"
        origin: EXISTING
        description: "Account tier definitions with base currency"
        type: "Database Table"
        referenced_in: "SD-OOP_Expense_single_data_capturing.json#currency_conversion"

      - name: "account"
        origin: EXISTING
