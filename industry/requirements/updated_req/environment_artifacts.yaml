# Environment Artifacts for Volopa Platform (OOP Expense Perspective)
# RAG Repository Substitute - stores existing platform symbols (tables, models,
#   middleware, endpoints, infrastructure) that agents would normally verify
#   against a live repository index.
#
# This file holds only the Interfaces dimension - existing structural contracts.
# All other environment dimensions (Intent, Requirements, Constraints, Flows,
#   Decisions) are in environment_context.yaml.
#
# Once an official repository is available, agents should verify EXISTING symbols
# via RAG index instead of relying solely on this file.

metadata:
  platform_name: "Volopa"
  version: "1.0"
  description: "RAG substitute - existing platform symbols (database tables, Eloquent models, middleware, endpoints, infrastructure) referenced by OOP Expense specs"
  purpose: "Provides the Interfaces dimension for environment context, serving as a symbol registry until a live repository RAG index is available"
  sources:
    - "SD-OOP_User_Management_System.json"
    - "SD-OOP_Pocket_expense.json"
    - "SD-OOP_Expense_single_data_capturing.json"
  generated_date: "2026-02-11"

# =============================================================================
# VERIFICATION CAPABILITY
# =============================================================================
verification:
  description: "This file serves as a RAG substitute until an official repository is established"
  capability: "Symbol existence, location, type, and signature lookup for EXISTING platform components"
  query_types:
    - "table existence and column signatures"
    - "model existence and backing table"
    - "middleware existence and application scope"
    - "endpoint existence and response contract"
    - "infrastructure component existence and capabilities"
  origin_protocol:
    EXISTING: "Must be evidenced by entry in this file (or repo RAG when available)"
    NEW: "Must be declared in project_context.yaml and collision-checked against entries here"
    UNKNOWN: "Must be resolved by lookup against this file (or repo RAG) before use"
  note: "Once a live repo is available, agents should verify EXISTING symbols via RAG index and treat this file as supplementary documentation"

# =============================================================================
# INTERFACES (Existing Platform Tables, Models, Middleware, Endpoints, Infra)
# =============================================================================
interfaces:
